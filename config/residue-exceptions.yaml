# template/ is a scaffold tree. It's fine for template/ files to have
# {{PLACEHOLDER}} content — that's their purpose. The residue guard uses
# frontmatter `status` to determine scope: only `status: signed` files are
# checked. Template files default to `status: template` and are skipped.
