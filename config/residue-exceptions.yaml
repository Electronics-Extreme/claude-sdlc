# config/residue-exceptions.yaml
# Allowlist for `scripts/check_residue.py`.
#
# Some legitimate content triggers the placeholder detector (e.g. CHANGELOG.md
# mentions historical TODOs; this file itself names the patterns). Each entry
# MUST be explicit — (file, line, token) tuple. Wildcards not accepted; every
# exception reviewed per-line.
#

version: 1

# Patterns the residue guard detects (reference for humans; the actual patterns
# are hard-coded in check_residue.py).
detected_patterns:
  - "{{...}} / {{PLACEHOLDER}}"
  - "TODO (case-sensitive, with or without trailing colon)"
  - "FIXME"
  - "XXX"
  - "<TBD> / [TBD] / (TBD)"
  - "[to-be-filled] / [replace me] / [PLACEHOLDER]"
  - "line containing only three dots"

# Per-file exception list. Each: file path, approx line (int or range), token,
# and justification. `check_residue.py` loads and skips these.
exceptions:
  - file: CHANGELOG.md
    token: "TODO"
    reason: "Keep-a-Changelog format may legitimately describe historical TODOs in past releases"

  - file: NOTICE.md
    token: "TODO"
    reason: "Example attribution header shown as reference includes the literal string"

  - file: config/residue-exceptions.yaml
    token: "{{...}}"
    reason: "This file references detected patterns — self-referential allowlist"
  - file: config/residue-exceptions.yaml
    token: "TODO"
    reason: "Same as above"
  - file: config/residue-exceptions.yaml
    token: "FIXME"
    reason: "Same"
  - file: config/residue-exceptions.yaml
    token: "XXX"
    reason: "Same"
  - file: config/residue-exceptions.yaml
    token: "<TBD>"
    reason: "Same"
  - file: config/residue-exceptions.yaml
    token: "[to-be-filled]"
    reason: "Same"

  - file: skill/SKILL.md
    token: "{{...}}"
    reason: "SKILL.md documents the template placeholder convention in its Anti-patterns section"

  - file: scripts/check_residue.py
    token: "TODO"
    reason: "The detector source code literally contains the token strings it detects"
  - file: scripts/check_residue.py
    token: "FIXME"
    reason: "Same"
  - file: scripts/check_residue.py
    token: "XXX"
    reason: "Same"

  - file: docs/sdlc/06_maintenance/change_requests.md
